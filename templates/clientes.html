<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clientes - GestãoTec+</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="app">

    <aside class="sidebar">
        <img src="{{ url_for('static', filename='logo.png') }}" class="sidebar-logo">

        <a href="/dashboard">Dashboard</a>
        <a href="/clientes">Clientes</a>
        <a href="/financeiro">Financeiro</a>
        <a href="/projetos">Projetos</a>
        <a href="/tarefas">Tarefas</a>
        <a href="/logout">Sair</a>
    </aside>

    <main class="main">

        <div class="topbar">
            <h1>Clientes</h1>
            <div class="user-box">Gestão de contatos</div>
        </div>

        <div class="form-card">
            <h2>Novo Cliente</h2>

            <form method="POST" class="form-grid">
                <input class="input" type="text" name="nome" placeholder="Nome" required>
                <input class="input" type="text" name="empresa" placeholder="Empresa">
                <input class="input" type="text" name="telefone" placeholder="Telefone">
                <input class="input" type="email" name="email" placeholder="E-mail">
                <button class="btn" type="submit">Cadastrar</button>
            </form>
        </div>

        <div class="table-card">
            <h2>Clientes cadastrados</h2>

            <table class="table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Empresa</th>
                        <th>Telefone</th>
                        <th>E-mail</th>
                    </tr>
                </thead>

                <tbody>
                    {% for cliente in clientes %}
                    <tr>
                        <td>{{ cliente[1] }}</td>
                        <td>{{ cliente[2] }}</td>
                        <td>{{ cliente[3] }}</td>
                        <td>{{ cliente[4] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

    </main>

</div>

</body>
</html>
